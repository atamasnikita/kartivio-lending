server {
    listen 80;
    listen [::]:80;
    server_name kartivio-ai.ru www.kartivio-ai.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name kartivio-ai.ru www.kartivio-ai.ru;

    root /var/www/kartivio-ai.ru/current;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/kartivio-ai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kartivio-ai.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), xr-spatial-tracking=()" always;

    location = /app {
        return 301 /app/;
    }

    location = /payment/return {
        return 302 /app/$is_args$args;
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /app/ {
        try_files /app/index.html =404;
        add_header Cache-Control "no-cache" always;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* ^/(?:app/.*\.(?:js|css)|.*\.(?:svg|ico|png|jpg|jpeg|webp|gif|txt|xml))$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
